name: Build Extensions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Chrome build
        run: |
          cp manifest/manifest.chrome.json manifest.json
          zip -r marklet-chrome.zip . -x "manifest/manifest.*.json"

      - name: Prepare Firefox build
        run: |
          cp manifest/manifest.firefox.json manifest.json
          zip -r marklet-firefox.zip . -x "manifest/manifest.*.json"

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: Latest Build
          overwrite_files: true
          make_latest: true
          files: |
            marklet-chrome.zip
            marklet-firefox.zip
